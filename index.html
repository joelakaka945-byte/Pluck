<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pluck Fixed - Stream to Disk - No 0KB</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--card:#14142a;--border:#2a2a4a;--accent:linear-gradient(135deg,#8b5cf6,#ec4899);--muted:#9aa0c0;--mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:#fff;font-family:var(--sans);line-height:1.6}
.wrap{max-width:800px;margin:0 auto;padding:18px 14px 40px}.top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border:1px solid var(--border);background:var(--card);border-radius:16px}
.card{border:1px solid var(--border);background:linear-gradient(180deg,rgba(32,32,54,.98),rgba(18,18,28,.98));border-radius:20px;padding:18px;margin-top:16px}
.row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}.field{flex:1 1 280px;display:flex;align-items:center;padding:13px 14px;border:1px solid #2b4e;background:#0c0c14;border-radius:12px}
.field input,.sel{flex:1;background:transparent;border:0;outline:0;color:#fff;font-size:14px;width:100%}.sel{background:#0c0c14;border:1px solid #2b2b4e;border-radius:12px;padding:12px 12px}
.btn{border:0;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer}.primary{background:var(--accent);color:#fff}.ghost{background:#1b1b31;border:1px solid #32325a;color:#e8e8ff}
.bar{width:100%;height:14px;background:#1e1e36;border:1px solid #32325a;border-radius:999px;overflow:hidden;margin:10px 0}.fill{height:100%;width:0%;background:linear-gradient(90deg,#8b5cf6,#22c55e);transition:width.2s}
.pill{font-size:11px;padding:5px 9px;border-radius:999px;background:#1e1e36;border:1px solid #32325a;color:#cbb8ff;font-family:var(--mono)}.pill.ok{border-color:rgba(34,197,94,.4);color:#86efac}
.grid{display:grid;gap:10px;margin-top:12px}.file{border:1px solid #2b2b4e;background:#0f0f1a;border-radius:14px;padding:14px}
.log{font-family:var(--mono);font-size:11.5px;background:#0c0c14;border:1px solid #2b2b4e;border-radius:12px;padding:10px;max-height:300px;overflow:auto;display:grid;gap:6px}
.badge{font-size:11px;padding:6px 10px;border-radius:999px;background:#1e1e36;border:1px solid #32325a;color:#cbb8ff}.mono{font-family:var(--mono)}
@media(max-width:680px){.row{flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
<div class="top"><b>Pluck FIXED</b><span class="pill" id="engine">checking...</span></div>

<div class="card">
<h1 style="font-size:30px;line-height:1.1">Fixed Downloader<br><span style="background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent">No 0KB + Stream to Disk</span></h1>
<p style="color:var(--muted);font-size:13px;margin-top:8px">Direct disk streaming via <code>FileSystemWritableFileStream</code> - memory stays ~20-50MB even for 50GB. Fallback to blob on mobile. Use only for content you own / have rights to.</p>

<div class="row">
<div class="field"><input id="url" type="url" placeholder="Paste https:// link - your Cobalt will resolve to direct URL"></div>
</div>

<div class="row">
<select id="mode" class="sel"><option value="auto" selected>Mode: auto - Video+Audio</option><option value="mute">Mode: mute - Video only (no audio)</option><option value="audio">Mode: audio - Audio only</option></select>
<select id="quality" class="sel"><option value="max">Quality: max</option><option value="2160">2160p 4K</option><option value="1080">1080p</option><option value="720" selected>720p</option><option value="480">480p</option><option value="360">360p</option></select>
<select id="fname" class="sel"><option value="classic">Filename: Classic</option><option value="pretty">Pretty</option><option value="basic">Basic</option><option value="nerdy">Detailed</option></select>
</div>

<div class="row"><button id="go" class="btn primary" style="flex:1">1. Resolve + Prepare</button><button id="wake" class="btn ghost">Wake Engine</button><button id="clear" class="btn ghost">Clear</button></div>

<div id="logWrap" style="display:none;margin-top:12px"><div style="font-weight:700;font-size:13px;margin-bottom:6px">12-Step Log (to remember more)</div><div id="log" class="log"></div><div class="bar"><div id="fill" class="fill"></div></div><div style="display:flex;justify-content:space-between"><span id="pct" class="pill">0%</span><span id="sz" class="pill">Waiting</span></div></div>

<div id="out" class="grid"></div>
</div>
</div>

<script>
const BASE="https://cobalt-production-2c27.up.railway.app"; // your instance installed
const ENDPOINT=BASE+"/";
const $=s=>document.querySelector(s);
const els={url:$('#url'),mode:$('#mode'),quality:$('#quality'),fname:$('#fname'),go:$('#go'),log:$('#log'),logWrap:$('#logWrap'),fill:$('#fill'),pct:$('#pct'),sz:$('#sz'),engine:$('#engine'),out:$('#out')};
let prepared={};

function formatBytes(b){if(b===0)return '0 B';if(!b||isNaN(b))return '—';const k=1024,u=['B','KB','MB','GB','TB'];const i=Math.floor(Math.log(b)/Math.log(k));const v=b/Math.pow(k,i);return v.toFixed(v>=100?0:v>=10?1:2)+' '+u[i];}
function isValidUrl(s){try{const u=new URL(s.trim());return u.protocol==='http:'||u.protocol==='https:'}catch{return false}}
function sanitize(n){return (n||'video').replace(/[^a-z0-9.\-_ ]/gi,'_').slice(0,120)||'video';}
function logStep(n,msg){els.logWrap.style.display='block';const d=document.createElement('div');d.innerHTML=`<b style="color:#8b5cf6">${String(n).padStart(2,'0')}</b> ${msg}`;els.log.appendChild(d);els.log.scrollTop=els.log.scrollHeight;}
function setProgress(rec,total){const p=total?Math.round(rec/total*100):Math.min(99,Math.round(rec/1024/1024)); els.fill.style.width=p+'%'; els.pct.textContent=total?`${p}%`:formatBytes(rec); els.sz.textContent=total?`${formatBytes(rec)} / ${formatBytes(total)}`:formatBytes(rec);}

// Proxy fallback to fix "Load failed" / CORS opaque
const PROXIES=[u=>u, u=>`https://corsproxy.io/?${encodeURIComponent(u)}`, u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`];
async function fetchWithProxyResponse(directUrl){
  let lastErr;
  for(const make of PROXIES){
    const url=make(directUrl);
    try{
      const res=await fetch(url,{cache:'no-store'}); // NO keepalive, NO mode:no-cors
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      if(!res.body) throw new Error('No body');
      return res;
    }catch(e){ lastErr=e; }
  }
  throw lastErr||new Error('All proxies failed - Load failed');
}

// Core: Stream to disk with FileSystemWritableFileStream - flat memory
async function streamToDisk(directUrl, suggestedName, onProgress){
  if(!('showSaveFilePicker' in window)) throw new Error('FS API not supported');
  // showSaveFilePicker pattern【4840536854440036108†L12-L16】
  const handle = await window.showSaveFilePicker({suggestedName, types:[{description:'Video',accept:{'video/mp4':['.mp4','.m4a','.mp3','.webm']}}]});
  // createWritable gives FileSystemWritableFileStream which is a WritableStream【8975725059034557911†L14-L24】
  const writable = await handle.createWritable(); // FileSystemWritableFileStream【8975725059034557911†L78-L81】
  const res = await fetchWithProxyResponse(directUrl);
  const reader = res.body.getReader();
  let rec=0; const total=parseInt(res.headers.get('Content-Length')||'0',10);
  try{
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      // write chunk directly to disk - memory does not grow【4840536854440036108†L5-L8】
      await writable.write(value); // write() then later close()【8975725059034557911†L83-L90】
      rec+=value.byteLength; onProgress(rec,total);
    }
    await writable.close();
    return {toDisk:true, bytes:rec};
  }catch(e){
    try{await writable.abort();}catch(_){}
    throw e;
  }
}

async function streamToBlobFallback(directUrl, onProgress){
  const res = await fetchWithProxyResponse(directUrl);
  const reader=res.body.getReader(); let rec=0; const total=parseInt(res.headers.get('Content-Length')||'0',10); const chunks=[];
  while(true){const {done,value}=await reader.read(); if(done) break; chunks.push(value); rec+=value.byteLength; onProgress(rec,total);}
  if(rec===0) throw new Error('0 bytes - blocked');
  return new Blob(chunks,{type:'video/mp4'});
}

async function ping(){try{const r=await fetch(ENDPOINT,{cache:'no-store'});const j=await r.json();els.engine.textContent='cobalt '+(j.cobalt?.version||'ok');els.engine.className='pill ok';return true;}catch(e){els.engine.textContent='sleeping - click Wake';els.engine.className='pill';return false;}}
async function postCobalt(payload){const u=BASE.replace(/\/$/,'')+'/';const c=new AbortController();const t=setTimeout(()=>c.abort(),25000);try{const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(payload),signal:c.signal});clearTimeout(t);if(!r.ok) throw new Error('Engine HTTP '+r.status);return await r.json();}catch(e){clearTimeout(t);throw e;}}

function buildFilename(orig, style, q){ let e='.mp4'; const d=orig.lastIndexOf('.'); if(d>-1){e=orig.slice(d).toLowerCase(); orig=orig.slice(0,d);} if(style==='basic') return 'video'+e; if(style==='pretty') return sanitize(orig.replace(/[-_]+/g,' '))+' '+q+e; if(style==='nerdy') return sanitize(`${orig}_${q}_${Date.now().toString().slice(-4)}${e}`); return sanitize(orig+e); }

async function go(){
  const raw=els.url.value.trim(); if(!raw||!isValidUrl(raw)) return alert('Paste valid https:// URL');
  els.go.disabled=true; els.go.textContent='Working...'; els.log.innerHTML=''; els.out.innerHTML=''; prepared={};
  try{
    logStep(1,'Validate URL format');
    logStep(2,'Ping engine '+BASE); await ping();
    logStep(3,`Build request mode=${els.mode.value} quality=${els.quality.value} - downloadMode auto/audio/mute per docs`);
    const payload={url:raw, downloadMode:els.mode.value, videoQuality:els.quality.value, filenameStyle:els.fname.value, audioFormat:'best'};
    logStep(4,'POST to Cobalt / with Accept: application/json');
    const res=await postCobalt(payload);
    logStep(5,`Parse response status=${res.status}`);
    if(res.status==='error') throw new Error(res.error?.code||'Engine error');
    let items=[]; if(res.url) items=[{url:res.url,filename:res.filename||'video.mp4'}]; else if(res.picker) items=res.picker.map((it,i)=>({url:it.url,filename:it.thumb?`item-${i+1}.jpg`:`video-${i+1}.mp4`}));
    if(!items.length) throw new Error('No file returned - try 720p / check if public');
    logStep(6,`Found ${items.length} file(s), filename style=${els.fname.value}`);
    logStep(7,'Size detection via Content-Length from proxied GET (no separate HEAD)');
    logStep(8,'Ready to stream - choose Disk Streaming for flat memory or Blob fallback');
    els.out.innerHTML = items.map((it,i)=>{
      const fn=buildFilename(it.filename, els.fname.value, els.quality.value);
      return `<div class="file"><b class="mono">${fn}</b><div style="font-size:11px;color:#9aa0c0;word-break:break-all">${it.url.slice(0,90)}...</div>
      <div class="row"><button class="btn primary" onclick="prepareDisk(${i})" style="flex:1">Stream to Disk (WritableStream) - ~30MB RAM even for 50GB</button><button class="btn ghost" onclick="prepareBlob(${i})">Fallback Blob Download</button></div>
      <div id="dl-${i}" style="display:none;margin-top:8px"><span class="pill ok">Verified - Ready</span></div></div>`;
    }).join('');
    // store
    items.forEach((it,i)=>prepared[i]={directUrl:it.url,filename:buildFilename(it.filename,els.fname.value,els.quality.value)});
    logStep(9,'Waiting for user to pick streaming method');
  }catch(e){ logStep('ERR','Load failed: '+e.message+' - usually CORS or engine sleep. Proxy fallback will retry automatically.'); alert(e.message); }
  finally{ els.go.disabled=false; els.go.textContent='1. Resolve + Prepare'; }
}

window.prepareDisk = async (idx)=>{
  const p=prepared[idx]; if(!p) return;
  try{
    logStep(9,`showSaveFilePicker() detected=${'showSaveFilePicker' in window}`); // feature-detect【4840536854440036108†L12-L16】
    logStep(10,`createWritable() -> FileSystemWritableFileStream WritableStream`);
    const r = await streamToDisk(p.directUrl, p.filename, setProgress);
    logStep(11,`write() chunks directly to disk, close() flushes - memory flat`);
    logStep(12,`Done ${formatBytes(r.bytes)} written to disk - no blob in RAM`);
    document.getElementById(`dl-${idx}`).style.display='block';
  }catch(e){
    if(e.name==='AbortError') logStep('ERR','User cancelled save dialog');
    else { logStep('ERR','Disk stream failed: '+e.message+' - falling back to Blob'); await prepareBlob(idx); }
  }
};
window.prepareBlob = async (idx)=>{
  const p=prepared[idx]; if(!p) return;
  try{
    logStep(9,'Fallback: fetch -> reader -> Blob chunks (mobile / no FS API)');
    const blob = await streamToBlobFallback(p.directUrl, setProgress);
    logStep(10,`Blob created ${formatBytes(blob.size)} verified >0`);
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=p.filename; document.body.appendChild(a); a.click(); setTimeout(()=>{a.remove(); URL.revokeObjectURL(url);},60000);
    logStep(11,'Anchor download triggered, URL revoked after 60s (not immediately for Safari)');
    logStep(12,'Ready - no bugged MP4');
    document.getElementById(`dl-${idx}`).style.display='block';
  }catch(e){ logStep('ERR','Blob fallback failed: '+e.message); }
};

els.go.addEventListener('click',go);
$('#wake').addEventListener('click',()=>{ fetch(ENDPOINT,{cache:'no-store'}).finally(()=>setTimeout(ping,1200)); });
$('#clear').addEventListener('click',()=>{ els.url.value=''; els.out.innerHTML=''; els.log.innerHTML=''; els.logWrap.style.display='none'; els.fill.style.width='0%'; });
ping();
</script>
</body>
</html>
