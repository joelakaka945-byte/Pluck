<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pluck — Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0f14;--card:#121b27;--input:#0d1520;--border:#1d2d42;--text:#eaf0f8;--dim:#7e8ea8;--accent:#f2a93b;--teal:#5fd3c4;--red:#ff7a7a;--r:14px;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:"Space Grotesk",system-ui,sans-serif;min-height:100vh}
 .wrap{max-width:640px;margin:0 auto;padding:48px 18px 80px}
  header{display:flex;gap:14px;align-items:center;margin-bottom:28px}
 .logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--accent),#ff6a2a);display:grid;place-items:center;color:#000;font-weight:700;box-shadow:0 10px 30px rgba(242,169,59,.3)}
  h1{margin:0;font-size:32px;letter-spacing:-.02em;line-height:1} h1 span{color:var(--accent)}.sub{margin:6px 0 0;color:var(--dim);font-size:14px}
 .card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01)),var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  label{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:10px}
 .input-wrap{position:relative;display:flex;gap:8px}
  input{flex:1;background:var(--input);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-size:15px;outline:none;transition:.2s}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(242,169,59,.12)}
 .icon-btn{background:#17263a;border:1px solid var(--border);border-radius:10px;padding:0 14px;color:var(--dim);font-family:"JetBrains Mono",monospace;font-size:12px;cursor:pointer}
 .icon-btn:hover{color:var(--text);border-color:var(--accent)}
 .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}
 .fmt{background:var(--input);border:1px solid var(--border);border-radius:12px;padding:16px;color:var(--text);font-weight:600;font-size:14px;cursor:pointer;transition:.18s}
 .fmt small{display:block;font-family:"JetBrains Mono",monospace;font-weight:400;font-size:10px;color:var(--dim);margin-top:5px}
 .fmt:hover{transform:translateY(-1px);border-color:#2a4060;background:#132034}.fmt:active{transform:scale(.98)}
 .fmt:disabled{opacity:.45;cursor:not-allowed}
 .status{font-family:"JetBrains Mono",monospace;font-size:12px;padding:11px 12px;border-radius:9px;display:none;margin-bottom:10px;border:1px solid transparent}
 .status.show{display:block}.status.ok{color:var(--teal);background:rgba(95,211,196,.08);border-color:rgba(95,211,196,.2)}
 .status.err{color:var(--red);background:rgba(255,122,122,.08);border-color:rgba(255,122,122,.2)}.status.load{color:var(--dim);background:rgba(255,255,255,.03);border-color:var(--border)}
 .results{display:flex;flex-direction:column;gap:8px}
 .row{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--input);border:1px solid var(--border);border-radius:10px;padding:12px 14px;animation:up.2s ease}
  @keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
 .tag{font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;color:var(--dim)}
 .dl{color:var(--accent);text-decoration:none;font-weight:700;font-size:13px;padding:6px 12px;border-radius:100px;background:rgba(242,169,59,.12);border:1px solid rgba(242,169,59,.2)}
 .dl:hover{background:var(--accent);color:#000}
 .foot{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-family:"JetBrains Mono",monospace;font-size:11px;color:#4d5f7a;display:flex;gap:8px;align-items:center}
 .dot{width:7px;height:7px;border-radius:50%;background:#4d5f7a;box-shadow:0 0 0 4px rgba(255,255,255,.04)}.foot.ok.dot{background:var(--teal);box-shadow:0 0 10px rgba(95,211,196,.6)}.foot.warn.dot{background:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <header><div class="logo">P</div><div><h1>Pluck <span>Pro</span></h1><div class="sub">Fixed Edition • Engine locked to /api/json</div></div></header>
  <div class="card">
    <label for="url">Paste public media URL</label>
    <div class="input-wrap">
      <input id="url" type="text" placeholder="https://instagram.com/reel/... tiktok.com/@... youtube.com/watch?v=...">
      <button class="icon-btn" id="paste">PASTE</button>
      <button class="icon-btn" id="clear">✕</button>
    </div>
    <div class="grid">
      <button class="fmt" data-mode="audio">MP3 <small>audio only • mp3</small></button>
      <button class="fmt" data-mode="auto">MP4 <small>video + audio • max</small></button>
    </div>
    <div id="status" class="status"></div>
    <div id="results" class="results"></div>
    <div id="engine" class="foot"><span class="dot"></span><span>Checking engine…</span></div>
  </div>
</div>

<script>
  // ✅ Your fixed endpoint — this is the correct one for your Railway instance
  const API = "https://pluck-production-e8f7.up.railway.app/api/json";

  const $url = document.getElementById('url');
  const $status = document.getElementById('status');
  const $results = document.getElementById('results');
  const $engine = document.getElementById('engine');

  document.getElementById('paste').onclick = async () => {
    try { $url.value = await navigator.clipboard.readText(); } catch { $url.focus(); }
  };
  document.getElementById('clear').onclick = () => { $url.value=''; $results.innerHTML=''; hideStatus(); $url.focus(); };
  function showStatus(m,c){ $status.textContent=m; $status.className='status show '+c; }
  function hideStatus(){ $status.className='status'; }

  async function handle(mode){
    const link = $url.value.trim();
    if(!link) return showStatus('Paste a link first.','err');
    try{ new URL(link); } catch{ return showStatus('Not a valid URL.','err'); }

    $results.innerHTML=''; showStatus('Contacting engine…','load');
    document.querySelectorAll('.fmt').forEach(b=>b.disabled=true);

    try{
      const res = await fetch(API, {
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body: JSON.stringify({ url: link, downloadMode: mode, audioFormat:'mp3', vQuality:'max', filenamePattern:'classic' })
      });
      const data = await res.json();
      if(!res.ok || data.status==='error') throw new Error(data.error?.code || `HTTP ${res.status}`);

      // Handle all cobalt response types correctly
      if(data.status==='picker'){
        showStatus(`Found ${data.picker.length} items — pick one:`, 'ok');
        data.picker.forEach((it,i)=>{
          const row=document.createElement('div'); row.className='row';
          row.innerHTML=`<span class="tag">Item ${i+1} • ${it.type}</span><a class="dl" href="${it.url}" target="_blank" rel="noopener">Download</a>`;
          $results.appendChild(row);
        });
        if(data.audio){ const r=document.createElement('div'); r.className='row'; r.innerHTML=`<span class="tag">Background audio</span><a class="dl" href="${data.audio}" target="_blank">Download MP3</a>`; $results.appendChild(r); }
      } else {
        const href = data.url || (Array.isArray(data.tunnel)?data.tunnel[0]:data.tunnel);
        const name = data.filename || data.output?.filename || (mode==='audio'?'audio.mp3':'video.mp4');
        showStatus('Ready — click to download.','ok');
        const row=document.createElement('div'); row.className='row';
        row.innerHTML=`<span class="tag">${mode==='audio'?'MP3 ready':'MP4 ready'}</span><a class="dl" href="${href}" download="${name}" target="_blank" rel="noopener">Download ${name}</a>`;
        $results.appendChild(row);
        // auto-open for your UX
        window.open(href,'_blank','noopener');
      }
    }catch(e){
      const msg = e.message==='Failed to fetch'? 'Engine sleeping — open Railway URL once to wake it.' : e.message;
      showStatus('Error: '+msg,'err');
    }finally{
      document.querySelectorAll('.fmt').forEach(b=>b.disabled=false);
    }
  }

  document.querySelectorAll('.fmt').forEach(b=> b.addEventListener('click', ()=> handle(b.dataset.mode)));

  // Correct health check — GET, not HEAD (HEAD = 405)
  async function check(){
    try{
      const r = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({url:'https://example.com'}) });
      // we just want to see if it responds with JSON, even if error
      const j = await r.json();
      $engine.className='foot ok'; $engine.innerHTML=`<span class="dot"></span><span>Engine online — cobalt ${j.cobalt?.version||'v10+'} • ready</span>`;
    }catch{
      $engine.className='foot warn'; $engine.innerHTML=`<span class="dot"></span><span>Engine unreachable — open Railway URL to wake</span>`;
    }
  }
  check();
  // keep awake — 4 min interval (Railway sleeps after 5)
  setInterval(check, 1000*60*4);
</script>
</body>
</html>
