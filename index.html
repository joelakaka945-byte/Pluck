<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Pluck — Universal Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #0a0a0f; --card-bg: rgba(18, 18, 28, 0.95); --border: #272746; --border-focus: #8b5cf6; --accent: linear-gradient(135deg, #8b5cf6, #ec4899); --text-main: #f5f5ff; --text-muted: #9aa0c0; --mono: 'JetBrains Mono', monospace; --sans: 'Space Grotesk', system-ui, -apple-system, sans-serif; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); color: var(--text-main); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; line-height: 1.5; }
   .mono { font-family: var(--mono)!important; }
   .bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(700px 500px at 10% 0%, rgba(139,92,246,.22), transparent 60%), radial-gradient(700px 500px at 90% 10%, rgba(236,72,153,.14), transparent 60%), var(--bg); pointer-events: none; }
   .wrap { max-width: 760px; margin: 0 auto; padding: 18px 14px 40px; }
   .top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; padding: 14px 16px; border: 1px solid var(--border); background: var(--card-bg); border-radius: 18px; backdrop-filter: blur(12px); }
   .brand { font-weight: 800; display: flex; gap: 9px; align-items: center; font-size: 18px; }
   .brand-icon { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 10px; background: var(--accent); color: white; font-size: 16px; }
   .status { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--text-muted); }
   .dot { width: 9px; height: 9px; border-radius: 50%; background: #f59e0b; box-shadow: 0 0 0 6px rgba(245,158,11,.18); animation: pulse 1.6s infinite; }
   .dot.ok { background: #22c55e; box-shadow: 0 0 0 6px rgba(34,197,94,.18); animation: none; }
   .dot.bad { background: #ef4444; box-shadow: 0 0 0 6px rgba(239,68,68,.18); animation: none; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity:.45; } }
   .hero { margin: 26px 6px 18px; }
   .hero h1 { font-size: clamp(34px, 8vw, 46px); line-height:.95; letter-spacing: -.05em; font-weight: 800; }
   .hero h1 span { background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
   .hero p { color: var(--text-muted); margin-top: 12px; font-size: 15px; line-height: 1.7; max-width: 580px; }
   .card { border: 1px solid var(--border); background: linear-gradient(180deg, rgba(32,32,54,.98), rgba(18,18,28,.98)); border-radius: 22px; padding: 18px; }
   .switch { display: inline-flex; gap: 4px; padding: 4px; background: #0f0f1b; border: 1px solid #2c2c4e; border-radius: 999px; }
   .sw { padding: 8px 16px; border-radius: 999px; border: 0; background: transparent; color: #8d8db3; font-weight: 700; font-size: 13px; cursor: pointer; }
   .sw.on { background: var(--accent); color: #fff; }
   .meta-pills { display: flex; gap: 6px; flex-wrap: wrap; }
   .pill { font-size: 11px; border: 1px solid #2b2b4e; padding: 5px 9px; border-radius: 999px; color: #8c8cb6; }
   .pill b { color: #fff; }
   .row { display: flex; gap: 10px; margin-top: 14px; }
   .field { flex: 1; display: flex; gap: 10px; align-items: center; padding: 14px 16px; border: 1px solid #2b2b4a; background: #0c0c14; border-radius: 16px; }
   .field:focus-within { border-color: var(--border-focus); box-shadow: 0 0 0 4px rgba(139,92,246,.18); }
   .field input { flex: 1; background: transparent; border: 0; outline: 0; color: #fff; font-size: 15px; font-family: inherit; min-width: 0; }
   .btn { border: 0; border-radius: 14px; padding: 12px 18px; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 14px; }
   .btn:active { transform: scale(.97); }
   .primary { background: var(--accent); color: #fff; }
   .ghost { background: #1b1b31; border: 1px solid #31315a; color: #e8e8ff; }
   .grid3 { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 14px; }
   .pick { border: 1px solid #2b2b4e; background: #0f0f1a; border-radius: 16px; padding: 14px; text-align: left; display: flex; flex-direction: column; gap: 4px; }
   .pick.on { border-color: var(--border-focus); box-shadow: 0 0 0 4px rgba(139,92,246,.16); background: linear-gradient(180deg, rgba(139,92,246,.14), #0f0f1a); }
   .pick b { font-size: 14px; }
   .pick code { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 999px; background: #1e1e36; border: 1px solid #32325a; color: #cbb8ff; }
   .pick small { display: block; color: #8c8cb6; font-size: 11.5px; line-height: 1.5; margin-top: 4px; }
   .expert { display: none; margin-top: 16px; border-top: 1px dashed #2f2f55; padding-top: 14px; }
   .expert.show { display: block; }
   .sel { padding: 11px 14px; border-radius: 12px; border: 1px solid #2b2b4e; background: #0c0c14; color: #fff; font-size: 13px; width: 100%; }
   .kv { display: grid; grid-template-columns: 120px 1fr; gap: 8px; font-size: 12px; color: #8c8cb6; margin-top: 8px; }
   .kv b { color: #fff; word-break: break-all; }
   .checkbox-label { display: flex; gap: 8px; align-items: center; margin-top: 12px; font-size: 12px; color: var(--text-muted); }
   .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
   .out { display: none; margin-top: 16px; }
   .out.show { display: block; }
   .box { border: 1px solid #2b2b4e; background: #0c0c14; border-radius: 16px; padding: 16px; margin-top: 10px; }
   .box pre { white-space: pre-wrap; word-break: break-word; font-size: 12px; color: #d3d3f2; line-height: 1.7; font-family: var(--mono); }
   .box.ok { border-color: rgba(34,197,94,.3); background: linear-gradient(180deg, rgba(34,197,94,.08), #0c0c14); }
   .box.err { border-color: rgba(239,68,68,.3); background: linear-gradient(180deg, rgba(239,68,68,.08), #0c0c14); }
   .dl-grid { display: grid; grid-template-columns: 1fr; gap: 9px; margin-top: 12px; }
    @media (min-width: 600px) {.dl-grid { grid-template-columns: 1fr 1fr; } }
   .fun { margin-top: 16px; padding: 14px 16px; border: 1px solid #2e2e52; border-radius: 16px; background: linear-gradient(135deg, rgba(139,92,246,.14), rgba(236,72,153,.08)); font-size: 13px; color: var(--text-muted); }
    @media (max-width: 680px) {.hero h1 { font-size: 34px; }.row { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <div class="top"><div class="brand"><span class="brand-icon">P</span> Pluck</div><div class="status"><span id="dot" class="dot"></span><span id="stxt">Checking...</span></div></div>
    <div class="hero"><h1 id="h1">You are<br><span>almost there.</span></h1><p>Paste any link and Pluck will handle the rest.</p></div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;align-items:center;">
        <div class="switch"><button id="bS" class="sw on">Simple Mode</button><button id="bE" class="sw">Expert Mode</button></div>
        <div class="meta-pills"><span class="pill">Engine <b id="ver">checking</b></span><span class="pill" id="lat">— ms</span></div>
      </div>
      <div class="row"><div class="field"><span>🔗</span><input id="url" type="url" placeholder="Paste a full YouTube, TikTok, or Instagram link here" autocomplete="off" spellcheck="false" /></div><button id="go" class="btn primary">Pluck</button></div>
      <div class="grid3"><button class="pick on" data-f="mp4"><b>Video plus Audio</b><code>mp4</code><small>Combined video and audio. Works everywhere.</small></button></div>
      <div id="ex" class="expert"><div class="controls"><select id="vq" class="sel"><option value="max">max</option><option value="1080">1080p</option><option value="720" selected>720p</option><option value="480">480p</option></select><select id="fn" class="sel"><option value="pretty">pretty</option><option value="classic">classic</option></select></div><div class="kv"><span>last response</span><b id="kvResp" class="mono">Waiting...</b></div><label class="checkbox-label"><input id="nm" type="checkbox"> Disable metadata</label></div>
      <div class="actions"><button id="wake" class="btn ghost">Wake Engine</button><button id="clear" class="btn ghost">Clear</button><button id="refreshBtn" class="btn ghost" style="display:none">↻ Refresh / New Download</button><a id="test" target="_blank" rel="noopener" class="btn ghost" style="text-decoration:none">Test Engine</a></div>
      <div id="out" class="out"></div>
    </div>
    <div class="fun"><b>Random fact:</b> <span id="ft"></span></div>
  </div>
<script>
    const BASE="https://cobalt-production-2c27.up.railway.app"; const ENDPOINT=BASE+"/"; const FACTS=["Octopuses have 3 hearts.","Honey never spoils.","Bananas are berries."];
    let state={online:false,factPool:[...FACTS]}; const $=s=>document.querySelector(s);
    const els={dot:$('#dot'),stxt:$('#stxt'),ver:$('#ver'),lat:$('#lat'),out:$('#out'),ft:$('#ft'),kvResp:$('#kvResp'),url:$('#url'),go:$('#go'),test:$('#test')};
    const refreshBtn=$('#refreshBtn');
    function getFact(){ if(!state.factPool.length) state.factPool=[...FACTS]; return state.factPool.pop(); }
    function isValidUrl(s){ try{ const u=new URL(s.trim()); return ['http:','https:'].includes(u.protocol); }catch{ return false; } }
    function sanitize(n){ return (n||'pluck-media').replace(/[^a-z0-9.\-_ ]/gi,'_').slice(0,200); }
    function extractItems(r){ if(!r) throw new Error('Empty'); if(r.status==='error') throw new Error(r.error?.code||'Error'); if(r.status==='picker'&&Array.isArray(r.picker)) return r.picker.map((it,i)=>({url:it.url,filename:sanitize(`pluck-${i+1}.${it.type==='photo'?'jpg':'mp4'}`),label:it.type})); if(r.url) return [{url:r.url,filename:sanitize(r.filename||'pluck-media.mp4'),label:'MP4'}]; throw new Error('No file'); }
    function showOutput(t,title,c,d=null){ els.out.classList.add('show'); if(d) els.kvResp.textContent=JSON.stringify(d).slice(0,400); const cls=t==='ok'?'box ok':'box err'; els.out.innerHTML=`<div class="${cls}"><div style="font-weight:800;margin-bottom:8px">${title}</div>${c}</div>`; if(refreshBtn) refreshBtn.style.display='inline-block'; }
    function showError(title,msg){ showOutput('err',title,`<pre>${msg}</pre>`); }
    window.blobDownload=async(url,name)=>{
      try{
        const r=await fetch(url,{mode:'cors'});
        if(!r.ok) throw new Error('cors-blocked');
        const b=await r.blob();
        const o=URL.createObjectURL(b);
        const a=document.createElement('a');
        a.href=o; a.download=name; a.style.display='none';
        document.body.appendChild(a); a.click();
        setTimeout(()=>{URL.revokeObjectURL(o);a.remove();},60000);
      }catch{
        const a=document.createElement('a');
        a.href=url;
        a.download=name;
        a.style.display='none';
        document.body.appendChild(a);
        a.click();
        setTimeout(()=>a.remove(),1000);
      }
    };
    window.copyLink=async(u)=>{ try{ await navigator.clipboard.writeText(u); alert('Copied!'); }catch{ prompt('Copy:',u); } };
    window.shareFile=async(u)=>{ if(navigator.share){ try{ await navigator.share({url:u}); }catch{} } else copyLink(u); };
    function buildButtons(url,fn){ const n=sanitize(fn); const su=String(url).replace(/'/g,"%27"); const sn=String(n).replace(/'/g,"\\'"); return `<div class="dl-grid"><a href="${su}" target="_blank" class="btn primary" style="text-align:center;text-decoration:none">Open in Tab ✅</a><button class="btn ghost" onclick="blobDownload('${su}','${sn}')">Blob Save (Fixes TikTok)</button><button class="btn ghost" onclick="copyLink('${su}')">Copy Link</button></div>`; }
    function buildItemsBlock(items){ return items.map(it=>`<b>📹 ${it.filename}</b>${buildButtons(it.url,it.filename)}`).join('<br>'); }
    async function ping(){ const t0=performance.now(); try{ const r=await fetch(ENDPOINT,{cache:'no-store',mode:'cors'}); const ms=Math.round(performance.now()-t0); els.lat.textContent=`${ms} ms`; const j=await r.json(); if(!j.cobalt) throw new Error(); state.online=true; els.dot.className='dot ok'; els.ver.textContent=`cobalt ${j.cobalt.version||'10.x'}`; els.stxt.textContent='Engine is online'; }catch{ state.online=false; els.dot.className='dot bad'; els.ver.textContent='warming up'; } }
    async function postToCobalt(p){ const r=await fetch(ENDPOINT,{method:'POST',mode:'cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}); if(!r.ok) throw new Error(`HTTP ${r.status}`); return await r.json(); }
    async function go(){ const raw=els.url.value.trim(); if(!raw) return showError('Error','Paste a link'); if(!isValidUrl(raw)) return showError('Invalid','Bad URL'); els.go.disabled=true; els.go.textContent='Processing...'; try{ if(!state.online) await ping(); const base={url:raw,filenameStyle:$('#fn').value,disableMetadata:$('#nm').checked}; const result=await postToCobalt({...base,downloadMode:'auto',videoQuality:$('#vq').value,audioFormat:'best'}); const items=extractItems(result); showOutput('ok','Video Ready',buildItemsBlock(items),result); }catch(e){ showError('Failed',e.message); }finally{ els.go.disabled=false; els.go.textContent='Pluck'; } }
    els.go.addEventListener('click',go); els.url.addEventListener('keydown',e=>e.key==='Enter'&&go());
    $('#bS').addEventListener('click',()=>{ $('#bS').classList.add('on'); $('#bE').classList.remove('on'); $('#ex').classList.remove('show'); });
    $('#bE').addEventListener('click',()=>{ $('#bE').classList.add('on'); $('#bS').classList.remove('on'); $('#ex').classList.add('show'); });
    $('#wake').addEventListener('click',async()=>{ els.stxt.textContent='Waking...'; try{ await fetch(ENDPOINT,{method:'HEAD',mode:'no-cors'});}catch{} setTimeout(ping,1500); });
    $('#clear').addEventListener('click',()=>{ els.url.value=''; els.out.classList.remove('show'); els.out.innerHTML=''; if(refreshBtn) refreshBtn.style.display='none'; });
    refreshBtn.addEventListener('click',()=>location.reload());
    els.test.href=BASE; els.ft.textContent=getFact(); ping();
</script>
</body>
</html>
